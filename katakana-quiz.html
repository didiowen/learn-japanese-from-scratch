<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>зүҮеҒҮеҗҚиЁҳжҶ¶жё¬й©—</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #f5f0e8;
  --accent: #c0392b;
  --soft: #8b7355;
  --card: #faf7f2;
  --success: #27ae60;
  --fail: #c0392b;
  --neutral: #7f8c8d;
  --border: rgba(139,115,85,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  background-image: radial-gradient(ellipse at 20% 20%, rgba(192,57,43,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(139,115,85,0.08) 0%, transparent 50%);
}

h1.title {
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--soft);
  margin-bottom: 18px;
  text-align: center;
}

/* в”Җв”Җ Mode tabs в”Җв”Җ */
.mode-tabs {
  display: flex;
  gap: 0;
  max-width: 360px;
  width: 100%;
  margin-bottom: 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.mode-tab {
  flex: 1;
  padding: 11px 6px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
  line-height: 1.3;
}
.mode-tab:last-child { border-right: none; }
.mode-tab.active {
  background: var(--ink);
  color: var(--paper);
  font-weight: 400;
}

/* в”Җв”Җ Progress в”Җв”Җ */
.progress-bar {
  width: 100%;
  max-width: 360px;
  height: 3px;
  background: rgba(0,0,0,0.08);
  border-radius: 2px;
  margin-bottom: 18px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* в”Җв”Җ Card в”Җв”Җ */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--soft));
}
.sr-badge {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 0.75rem;
  color: var(--soft);
  opacity: 0.5;
  letter-spacing: 0.08em;
}
.question-type {
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 14px;
  font-weight: 400;
}
.main-char {
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 4.5rem;
  text-align: center;
  line-height: 1;
  margin: 8px 0 4px;
  color: var(--ink);
}
.sub-info {
  text-align: center;
  font-size: 0.88rem;
  color: var(--neutral);
  margin-bottom: 16px;
  letter-spacing: 0.05em;
  min-height: 18px;
}
.hint {
  font-size: 0.88rem;
  color: var(--neutral);
  text-align: center;
  margin-bottom: 20px;
  min-height: 16px;
  font-style: italic;
  line-height: 1.5;
}

/* в”Җв”Җ Options в”Җв”Җ */
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.option-btn {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 8px;
  font-size: 1.7rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
  text-align: center;
  line-height: 1.3;
}
.option-btn.reading {
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 1.05rem;
  padding: 14px 8px;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: rgba(192,57,43,0.04);
  transform: translateY(-1px);
}
.option-btn.correct { background: rgba(39,174,96,0.1); border-color: var(--success); color: var(--success); font-weight: 400; }
.option-btn.wrong { background: rgba(192,57,43,0.08); border-color: var(--fail); color: var(--fail); }
.option-btn:disabled { cursor: default; }

/* в”Җв”Җ Input в”Җв”Җ */
.input-wrap { margin-bottom: 12px; }
.romaji-input {
  width: 100%;
  padding: 13px 16px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
  letter-spacing: 0.08em;
}
.romaji-input:focus { border-color: var(--accent); }
.romaji-input.correct { border-color: var(--success); background: rgba(39,174,96,0.06); color: var(--success); }
.romaji-input.wrong { border-color: var(--fail); background: rgba(192,57,43,0.06); }

/* в”Җв”Җ Buttons в”Җв”Җ */
.submit-btn {
  width: 100%;
  background: var(--soft);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.submit-btn:hover { background: var(--accent); }
.next-btn {
  width: 100%;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  display: none;
}
.next-btn:hover { background: var(--accent); transform: translateY(-1px); }
.next-btn.visible { display: block; }

/* в”Җв”Җ Feedback в”Җв”Җ */
.feedback {
  min-height: 48px;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.95rem;
  line-height: 1.6;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.feedback.show-correct { background: rgba(39,174,96,0.08); color: var(--success); }
.feedback.show-wrong { background: rgba(192,57,43,0.06); color: var(--fail); }

/* в”Җв”Җ Score в”Җв”Җ */
.score-display {
  display: flex;
  justify-content: space-between;
  max-width: 360px;
  width: 100%;
  padding: 0 4px;
}
.score-item { text-align: center; font-size: 0.85rem; color: var(--neutral); letter-spacing: 0.05em; }
.score-num { display: block; font-size: 1.5rem; font-weight: 400; color: var(--ink); font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif; }

/* в”Җв”Җ Result в”Җв”Җ */
.result-screen { text-align: center; padding: 16px 8px; }
.result-screen .big-emoji { font-size: 3rem; margin: 8px 0; }
.result-screen h2 { font-size: 1.2rem; font-weight: 400; margin-bottom: 8px; }
.result-screen p { font-size: 0.95rem; color: var(--soft); margin-bottom: 18px; line-height: 1.6; }
.restart-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 28px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.restart-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* в”Җв”Җ Section tabs в”Җв”Җ */
.section-tabs {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.section-tab {
  flex: 1;
  padding: 12px 6px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 1rem;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
}
.section-tab:last-child { border-right: none; }
.section-tab.active { background: var(--ink); color: var(--paper); font-weight: 400; }

/* в”Җв”Җ Vocab toggle в”Җв”Җ */
.vocab-toggle {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.vocab-btn {
  flex: 1;
  padding: 10px 6px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
}
.vocab-btn:last-child { border-right: none; }
.vocab-btn.active { background: var(--soft); color: white; font-weight: 400; }


/* в”Җв”Җ Hint toggle в”Җв”Җ */
.hint-toggle-wrap {
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  display: flex;
  justify-content: flex-end;
}
.hint-toggle-btn {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.88rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: white;
  color: var(--soft);
  transition: all 0.15s;
}
.hint-toggle-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-weight: 400;
}

/* в”Җв”Җ Topic filter в”Җв”Җ */
.topic-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-width: 360px;
  width: 100%;
  margin-bottom: 12px;
}
.topic-btn {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.88rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: white;
  color: var(--soft);
  transition: all 0.15s;
}
.topic-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 400; }

/* в”Җв”Җ Round filter в”Җв”Җ */
.round-filter {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.round-btn {
  flex: 1;
  padding: 9px 2px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.round-btn:last-child { border-right: none; }
.round-btn.active { background: var(--accent); color: white; font-weight: 400; }
</style>
</head>

<h1 class="title">зүҮеҒҮеҗҚиЁҳжҶ¶жё¬й©—</h1>

<div class="section-tabs">
  <button class="section-tab active" id="tabKana" onclick="switchSection('kana')">дә”еҚҒйҹі</button>
  <button class="section-tab" id="tabVocab" onclick="switchSection('vocab')">е–®еӯ—</button>
</div>

<!-- ијӘж¬ЎйҒёж“Ү -->
<div class="round-filter" id="roundFilter">

  <button class="round-btn" data-round="2" onclick="setRound(2)">з¬¬2ијӘ</button>
  <button class="round-btn" data-round="3" onclick="setRound(3)">з¬¬3ијӘ</button>
  <button class="round-btn" data-round="4" onclick="setRound(4)">з¬¬4ијӘ</button>

</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

</div>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetScore() {
  totalAnswered = 0; totalCorrect = 0; streak = 0; sessionCount = 0;
  document.getElementById('scoreCorrect').textContent = 0;
  document.getElementById('scoreTotal').textContent = 0;
  document.getElementById('scoreStreak').textContent = 0;
  document.getElementById('progressFill').style.width = '0%';
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = totalCorrect;
  document.getElementById('scoreTotal').textContent = totalAnswered;
  document.getElementById('scoreStreak').textContent = streak;
}

function updateProgress() {
  const lim = getSessionLimit();
  document.getElementById('progressFill').style.width = (Math.min(sessionCount / lim, 1) * 100) + '%';
}

function buildKanaQueue(round) {
  const cards = round === 0 ? katakanaCards : katakanaCards.filter(c => c.round <= round);
  return cards.map(c => {
    const dist = round === 0 ? 0 : round - c.round;
    return { ...c, level: kanaProgress[c.char] ?? Math.min(dist, intervals.length - 1), nextReview: 0 };
  });
}

function setRound(n) {
  currentRound = n;
  document.querySelectorAll('.round-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.round) === n);
  });
  if (currentSection === 'kana') {
    queue = buildKanaQueue(n);
  } else {
    buildVocabQueue();
  }
  resetScore();
  nextCard();
}

function pickFromQueue() {
  const due = queue.filter(c => c.nextReview <= sessionCount);
  if (!due.length) return null;
  const sorted = [...due].sort((a, b) => a.level !== b.level ? a.level - b.level : a.nextReview - b.nextReview);
  const pool = sorted.slice(0, Math.min(3, sorted.length));
  return pool[Math.floor(Math.random() * pool.length)];
}

function advanceSRS(item, correct) {
  if (correct) {
    item.level = Math.min((item.level || 0) + 1, intervals.length - 1);
    streak++; totalCorrect++;
  } else {
    item.level = 0; streak = 0;
  }
  item.nextReview = sessionCount + intervals[item.level];
  if (item.char) kanaProgress[item.char] = item.level;
  if (item.word) vocabProgress[item.word] = item.level;
  saveProgress();
  totalAnswered++; sessionCount++;
  updateScore();
}

function normalizeRomaji(s) {
  return s.trim().toLowerCase().replace(/\s+/g, '').replace(/oo/g, 'o').replace(/uu/g, 'u').replace(/nn/g, 'n');
}

function switchSection(section) {
  currentSection = section;
  document.getElementById('tabKana').classList.toggle('active', section === 'kana');
  document.getElementById('tabVocab').classList.toggle('active', section === 'vocab');
  document.getElementById('kanaModes').style.display = section === 'kana' ? 'flex' : 'none';
  document.getElementById('hintToggleWrap').style.display = 'flex';
  document.getElementById('roundFilter').style.display = 'flex';
  document.getElementById('vocabToggle').style.display = section === 'vocab' ? 'flex' : 'none';
  resetScore();
  if (section === 'kana') {
    queue = buildKanaQueue(currentRound);
    nextCard();
  } else {
    buildVocabQueue();
    nextCard();
  }
}

function buildVocabQueue() {
  let filtered = currentRound > 0 ? vocabCards.filter(v => v.round <= currentRound) : vocabCards;
  vocabQueue = filtered.map(c => {
    const saved = vocabProgress[c.word];
    const level = saved ?? (alreadyKnown.has(c.word) ? 2 : 0);
    const nextReview = saved != null ? 0 : -((recentBatch[c.word] ?? 0) * 5);
    return { ...c, level, nextReview };
  });
  queue = vocabQueue;
}

function setVocabDir(dir) {
  vocabDir = dir;
  document.getElementById('btnJpZh').classList.toggle('active', dir === 'jp-to-zh');
  document.getElementById('btnZhJp').classList.toggle('active', dir === 'zh-to-jp');
  resetScore();
  buildVocabQueue();
  nextCard();
}

// NEXT CARD
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function nextCard() {
  answered = false;
  const lim = getSessionLimit();
  if (sessionCount >= lim) { showResult(); return; }
  currentCard = pickFromQueue();
  if (!currentCard) { showResult(); return; }

  if (currentSection === 'vocab') {
    if (vocabDir === 'jp-to-zh') renderVocabJpToZh();
    else renderVocabZhToJp();
    updateProgress(); return;
  }
  if (currentMode === 'char-to-reading') renderCharToReadingMultiple();
  else if (currentMode === 'char-to-input') renderCharToInput();
  else if (currentMode === 'reading-to-char') renderReadingToCharMultiple();
  else renderReadingToInput();

  updateProgress();
}

// MODE 1: еӯ—вҶ’и®Җйҹі йҒёж“ҮйЎҢ
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function getReadingDistractors(card) {
  const correct = card.reading;
  const correctChar = card.char;
  const similarChars = new Set();
  for (const group of similarGroups) {
    if (group.includes(correctChar)) group.forEach(c => { if (c !== correctChar) similarChars.add(c); });
  }
  const similarReadings = katakanaCards
    .filter(c => similarChars.has(c.char) && c.reading !== correct)
    .map(c => c.reading);
  const others = shuffle(katakanaCards.map(c => c.reading).filter(r => r !== correct && !similarReadings.includes(r)));
  return shuffle([correct, ...shuffle([...similarReadings, ...others]).slice(0, 3)]);
}

  fb.innerHTML = isCorrect ? `вң“ жӯЈзўәпјҒ` : `вң— жӯЈзўәжҳҜгҖҢ${currentCard.char}гҖҚ`;
  if (showHint) {
    document.getElementById('subInfo').textContent = `е№іеҒҮеҗҚпјҡ${currentCard.hiragana}гҖҖдҫҶжәҗпјҡ${currentCard.kanji}`;
    document.getElementById('hintText').textContent = 'рҹ’Ў ' + currentCard.hint;
  }
  document.getElementById('nextBtn').classList.add('visible');
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// RESULT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function showResult() {
  updateProgress();
  const pct = totalAnswered ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  let emoji, msg, sub;
  if (pct >= 90) { emoji = 'рҹҺҢ'; msg = 'е®ҢзҫҺпјҒ'; sub = `жӯЈзўәзҺҮ ${pct}%пјҢз№јзәҢдҝқжҢҒпјҒ`; }
  else if (pct >= 70) { emoji = 'рҹ‘Ҹ'; msg = 'еҫҲеҘҪпјҒ'; sub = `жӯЈзўәзҺҮ ${pct}%пјҢеҶҚз·ҙе№ҫж¬Ўе°ұиғҪйһҸеӣәгҖӮ`; }
  else { emoji = 'рҹ“–'; msg = 'з№јзәҢз·ҙзҝ’пјҒ'; sub = `жӯЈзўәзҺҮ ${pct}%пјҢй–“йҡ”йҮҚиӨҮе°ұжҳҜиҰҒеҸҚиҰҶдҫҶгҖӮ`; }
  document.getElementById('quizContent').innerHTML = `
    <div class="result-screen">
      <div class="big-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${sub}<br><br>жӯЈзўә ${totalCorrect} / ${totalAnswered} йЎҢ</p>
      <button class="restart-btn" onclick="restart()">еҶҚз·ҙдёҖж¬Ў</button>
    </div>
  `;
}

function restart() {
  if (currentSection === 'kana') {
    queue = buildKanaQueue(currentRound);
  } else {
    buildVocabQueue();
  }
  resetScore(); nextCard();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// INIT
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
loadProgress();
queue = buildKanaQueue(currentRound);
nextCard();

</script>
