<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>片假名記憶測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #f5f0e8;
  --accent: #c0392b;
  --soft: #8b7355;
  --card: #faf7f2;
  --success: #27ae60;
  --fail: #c0392b;
  --neutral: #7f8c8d;
  --border: rgba(139,115,85,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  background-image: radial-gradient(ellipse at 20% 20%, rgba(192,57,43,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(139,115,85,0.08) 0%, transparent 50%);
}

h1.title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  color: var(--soft);
  margin-bottom: 18px;
  text-align: center;
}

/* ── Mode tabs ── */
.mode-tabs {
  display: flex;
  gap: 0;
  max-width: 360px;
  width: 100%;
  margin-bottom: 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.mode-tab {
  flex: 1;
  padding: 11px 6px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.78rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
  line-height: 1.3;
}
.mode-tab:last-child { border-right: none; }
.mode-tab.active {
  background: var(--ink);
  color: var(--paper);
  font-weight: 500;
}

/* ── Progress ── */
.progress-bar {
  width: 100%;
  max-width: 360px;
  height: 3px;
  background: rgba(0,0,0,0.08);
  border-radius: 2px;
  margin-bottom: 18px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--soft));
}
.sr-badge {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 0.6rem;
  color: var(--soft);
  opacity: 0.5;
  letter-spacing: 0.08em;
}
.question-type {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 14px;
  font-weight: 500;
}
.main-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 4.5rem;
  text-align: center;
  line-height: 1;
  margin: 8px 0 4px;
  color: var(--ink);
}
.sub-info {
  text-align: center;
  font-size: 0.72rem;
  color: var(--neutral);
  margin-bottom: 16px;
  letter-spacing: 0.05em;
  min-height: 18px;
}
.hint {
  font-size: 0.73rem;
  color: var(--neutral);
  text-align: center;
  margin-bottom: 20px;
  min-height: 16px;
  font-style: italic;
  line-height: 1.5;
}

/* ── Options ── */
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.option-btn {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 8px;
  font-size: 1.4rem;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
  text-align: center;
  line-height: 1.3;
}
.option-btn.reading {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.9rem;
  padding: 14px 8px;
}
.option-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: rgba(192,57,43,0.04);
  transform: translateY(-1px);
}
.option-btn.correct { background: rgba(39,174,96,0.1); border-color: var(--success); color: var(--success); font-weight: 500; }
.option-btn.wrong { background: rgba(192,57,43,0.08); border-color: var(--fail); color: var(--fail); }
.option-btn:disabled { cursor: default; }

/* ── Input ── */
.input-wrap { margin-bottom: 12px; }
.romaji-input {
  width: 100%;
  padding: 13px 16px;
  font-size: 1rem;
  font-family: 'Noto Sans TC', sans-serif;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
  letter-spacing: 0.08em;
}
.romaji-input:focus { border-color: var(--accent); }
.romaji-input.correct { border-color: var(--success); background: rgba(39,174,96,0.06); color: var(--success); }
.romaji-input.wrong { border-color: var(--fail); background: rgba(192,57,43,0.06); }

/* ── Buttons ── */
.submit-btn {
  width: 100%;
  background: var(--soft);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 0.85rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.submit-btn:hover { background: var(--accent); }
.next-btn {
  width: 100%;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 0.85rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  display: none;
}
.next-btn:hover { background: var(--accent); transform: translateY(-1px); }
.next-btn.visible { display: block; }

/* ── Feedback ── */
.feedback {
  min-height: 48px;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.8rem;
  line-height: 1.6;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.feedback.show-correct { background: rgba(39,174,96,0.08); color: var(--success); }
.feedback.show-wrong { background: rgba(192,57,43,0.06); color: var(--fail); }

/* ── Score ── */
.score-display {
  display: flex;
  justify-content: space-between;
  max-width: 360px;
  width: 100%;
  padding: 0 4px;
}
.score-item { text-align: center; font-size: 0.68rem; color: var(--neutral); letter-spacing: 0.05em; }
.score-num { display: block; font-size: 1.3rem; font-weight: 500; color: var(--ink); font-family: 'Noto Serif JP', serif; }

/* ── Result ── */
.result-screen { text-align: center; padding: 16px 8px; }
.result-screen .big-emoji { font-size: 3rem; margin: 8px 0; }
.result-screen h2 { font-size: 1.05rem; font-weight: 500; margin-bottom: 8px; }
.result-screen p { font-size: 0.8rem; color: var(--soft); margin-bottom: 18px; line-height: 1.6; }
.restart-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 28px;
  font-size: 0.85rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.restart-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* ── Section tabs ── */
.section-tabs {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 14px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.section-tab {
  flex: 1;
  padding: 12px 6px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
}
.section-tab:last-child { border-right: none; }
.section-tab.active { background: var(--ink); color: var(--paper); font-weight: 500; }

/* ── Vocab toggle ── */
.vocab-toggle {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.vocab-btn {
  flex: 1;
  padding: 10px 6px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
}
.vocab-btn:last-child { border-right: none; }
.vocab-btn.active { background: var(--soft); color: white; font-weight: 500; }

/* ── Topic filter ── */
.topic-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-width: 360px;
  width: 100%;
  margin-bottom: 12px;
}
.topic-btn {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.72rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: white;
  color: var(--soft);
  transition: all 0.15s;
}
.topic-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 500; }

/* ── Round filter ── */
.round-filter {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.round-btn {
  flex: 1;
  padding: 9px 2px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.round-btn:last-child { border-right: none; }
.round-btn.active { background: var(--accent); color: white; font-weight: 500; }
</style>
</head>
<body>

<h1 class="title">片假名記憶測驗</h1>

<div class="section-tabs">
  <button class="section-tab active" id="tabKana" onclick="switchSection('kana')">五十音</button>
  <button class="section-tab" id="tabVocab" onclick="switchSection('vocab')">單字</button>
</div>

<!-- 輪次選擇 -->
<div class="round-filter" id="roundFilter">
  <button class="round-btn active" data-round="1" onclick="setRound(1)">第1輪</button>
  <button class="round-btn" data-round="2" onclick="setRound(2)">第2輪</button>
  <button class="round-btn" data-round="3" onclick="setRound(3)">第3輪</button>
  <button class="round-btn" data-round="4" onclick="setRound(4)">第4輪</button>
  <button class="round-btn" data-round="5" onclick="setRound(5)">第5輪</button>
  <button class="round-btn" data-round="0" onclick="setRound(0)">全部</button>
</div>

<!-- 四個模式 tab（五十音） -->
<div class="mode-tabs" id="kanaModes">
  <button class="mode-tab active" id="tab1" onclick="switchMode('char-to-reading')">字→讀音<br>選擇</button>
  <button class="mode-tab" id="tab2" onclick="switchMode('char-to-input')">字→讀音<br>輸入</button>
  <button class="mode-tab" id="tab3" onclick="switchMode('reading-to-char')">讀音→字<br>選擇</button>
  <button class="mode-tab" id="tab4" onclick="switchMode('reading-to-input')">讀音→字<br>輸入</button>
</div>

<!-- 單字 controls（隱藏直到切換） -->
<div class="vocab-toggle" id="vocabToggle" style="display:none">
  <button class="vocab-btn active" id="btnJpZh" onclick="setVocabDir('jp-to-zh')">日文→中文</button>
  <button class="vocab-btn" id="btnZhJp" onclick="setVocabDir('zh-to-jp')">中文→日文</button>
</div>
<div class="topic-filter" id="topicFilter" style="display:none">
  <button class="topic-btn active" onclick="setTopic('all')">全部</button>
  <button class="topic-btn" onclick="setTopic('food')">🍱 飲食</button>
  <button class="topic-btn" onclick="setTopic('daily')">💬 日常</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="card" id="mainCard">
  <span class="sr-badge">SRS</span>
  <div id="quizContent"></div>
</div>

<div class="score-display">
  <div class="score-item"><span class="score-num" id="scoreCorrect">0</span>正確</div>
  <div class="score-item"><span class="score-num" id="scoreTotal">0</span>已答</div>
  <div class="score-item"><span class="score-num" id="scoreStreak">0</span>連勝</div>
</div>

<script>
// ═══════════════════════════════
// DATA
// ═══════════════════════════════
const katakanaCards = [
  // ── 第1輪：ア行・ラ行・ン ──
  { char: 'ア', round: 1, reading: 'a',   hiragana: 'あ', kanji: '阿', hint: '「阿」左部「阝」→ ア（台語「阿」a）' },
  { char: 'イ', round: 1, reading: 'i',   hiragana: 'い', kanji: '伊', hint: '「伊」左部「亻」→ イ（台語「伊」i）' },
  { char: 'ウ', round: 1, reading: 'u',   hiragana: 'う', kanji: '宇', hint: '「宇」簡化 → ウ，台語「宇」û' },
  { char: 'エ', round: 1, reading: 'e',   hiragana: 'え', kanji: '江', hint: '「江」右部「工」→ エ' },
  { char: 'オ', round: 1, reading: 'o',   hiragana: 'お', kanji: '於', hint: '「於」右部 → オ' },
  { char: 'ラ', round: 1, reading: 'ra',  hiragana: 'ら', kanji: '良', hint: '「良」上部 → ラ，台語「良」liông，r/l 接近' },
  { char: 'リ', round: 1, reading: 'ri',  hiragana: 'り', kanji: '利', hint: '「利」右半刀旁 → リ，和り同源' },
  { char: 'ル', round: 1, reading: 'ru',  hiragana: 'る', kanji: '流', hint: '「流」右下彎鉤 → ル（る是「留」，不同源）' },
  { char: 'レ', round: 1, reading: 're',  hiragana: 'れ', kanji: '礼', hint: '「礼」幾乎未變 → レ，和れ同源' },
  { char: 'ロ', round: 1, reading: 'ro',  hiragana: 'ろ', kanji: '呂', hint: '「呂」上半方框 → ロ，台語白話「呂」lū' },
  { char: 'ン', round: 1, reading: 'n',   hiragana: 'ん', kanji: '尓', hint: '短撇向左收 → ン，注意和ソ的差別：撇短向左' },
  // ── 第2輪：カ行・ガ行・ナ行 ──
  { char: 'カ', round: 2, reading: 'ka',  hiragana: 'か', kanji: '加', hint: '「加」左部「力」→ カ' },
  { char: 'キ', round: 2, reading: 'ki',  hiragana: 'き', kanji: '幾', hint: '「幾」骨架簡化 → キ，和き同源' },
  { char: 'ク', round: 2, reading: 'ku',  hiragana: 'く', kanji: '久', hint: '「久」右上部 → ク，く圓ク有稜角' },
  { char: 'ケ', round: 2, reading: 'ke',  hiragana: 'け', kanji: '介', hint: '「介」中部 → ケ（け是「計」，不同源）' },
  { char: 'コ', round: 2, reading: 'ko',  hiragana: 'こ', kanji: '己', hint: '「己」方形化 → コ，和こ同源' },
  { char: 'ガ', round: 2, reading: 'ga',  hiragana: 'が', kanji: '加＋゛', hint: '「加」＋濁點 → ガ，カ加濁點，k→g' },
  { char: 'ギ', round: 2, reading: 'gi',  hiragana: 'ぎ', kanji: '幾＋゛', hint: '「幾」＋濁點 → ギ，キ加濁點' },
  { char: 'グ', round: 2, reading: 'gu',  hiragana: 'ぐ', kanji: '久＋゛', hint: '「久」＋濁點 → グ，ク加濁點' },
  { char: 'ゲ', round: 2, reading: 'ge',  hiragana: 'げ', kanji: '介＋゛', hint: '「介」＋濁點 → ゲ，ケ加濁點' },
  { char: 'ゴ', round: 2, reading: 'go',  hiragana: 'ご', kanji: '己＋゛', hint: '「己」＋濁點 → ゴ，コ加濁點' },
  { char: 'ナ', round: 2, reading: 'na',  hiragana: 'な', kanji: '奈', hint: '「奈」上部 → ナ' },
  { char: 'ニ', round: 2, reading: 'ni',  hiragana: 'に', kanji: '仁', hint: '「仁」右部兩橫 → ニ，注意不是數字「二」' },
  { char: 'ヌ', round: 2, reading: 'nu',  hiragana: 'ぬ', kanji: '奴', hint: '「奴」右部 → ヌ，比ぬ少封閉圈' },
  { char: 'ネ', round: 2, reading: 'ne',  hiragana: 'ね', kanji: '祢', hint: '「祢」衣字旁 → ネ，和ね同源' },
  { char: 'ノ', round: 2, reading: 'no',  hiragana: 'の', kanji: '乃', hint: '「乃」一撇 → ノ，和の同源' },
  // ── 第3輪：サ行・ザ行・ヤ行・ワ ──
  { char: 'サ', round: 3, reading: 'sa',  hiragana: 'さ', kanji: '散', hint: '「散」左上兩橫一撇 → サ（さ是「左」，不同源）' },
  { char: 'シ', round: 3, reading: 'shi', hiragana: 'し', kanji: '之', hint: '「之」三點橫排 → シ，像笑臉 :)　注意和ツ的差別：點是橫的' },
  { char: 'ス', round: 3, reading: 'su',  hiragana: 'す', kanji: '須', hint: '「須」右部 → ス，比す少一個圈' },
  { char: 'セ', round: 3, reading: 'se',  hiragana: 'せ', kanji: '世', hint: '「世」幾乎未變 → セ，和せ同源' },
  { char: 'ソ', round: 3, reading: 'so',  hiragana: 'そ', kanji: '曽', hint: '「曽」上部一長撇 → ソ，注意和ン的差別：撇長向右' },
  { char: 'ザ', round: 3, reading: 'za',  hiragana: 'ざ', kanji: '散＋゛', hint: '「散」＋濁點 → ザ，サ加濁點，s→z' },
  { char: 'ジ', round: 3, reading: 'ji',  hiragana: 'じ', kanji: '之＋゛', hint: '「之」＋濁點 → ジ，シ加濁點' },
  { char: 'ズ', round: 3, reading: 'zu',  hiragana: 'ず', kanji: '須＋゛', hint: '「須」＋濁點 → ズ，ス加濁點' },
  { char: 'ゼ', round: 3, reading: 'ze',  hiragana: 'ぜ', kanji: '世＋゛', hint: '「世」＋濁點 → ゼ，セ加濁點' },
  { char: 'ゾ', round: 3, reading: 'zo',  hiragana: 'ぞ', kanji: '曽＋゛', hint: '「曽」＋濁點 → ゾ，ソ加濁點' },
  { char: 'ヤ', round: 3, reading: 'ya',  hiragana: 'や', kanji: '也', hint: '「也」草書簡化 → ヤ，和や同源' },
  { char: 'ユ', round: 3, reading: 'yu',  hiragana: 'ゆ', kanji: '由', hint: '「由」下部 → ユ，和ゆ同源' },
  { char: 'ヨ', round: 3, reading: 'yo',  hiragana: 'よ', kanji: '與', hint: '「與」三橫簡化 → ヨ，和よ同源' },
  { char: 'ワ', round: 3, reading: 'wa',  hiragana: 'わ', kanji: '和', hint: '「和」右部 → ワ，和わ同源' },
  // ── 第4輪：タ行・ダ行・マ行 ──
  { char: 'タ', round: 4, reading: 'ta',  hiragana: 'た', kanji: '多', hint: '「多」上部 → タ（た是「太」，不同源）' },
  { char: 'チ', round: 4, reading: 'chi', hiragana: 'ち', kanji: '千', hint: '「千」變形 → チ（ち是「知」，不同源）' },
  { char: 'ツ', round: 4, reading: 'tsu', hiragana: 'つ', kanji: '川', hint: '「川」三撇豎起 → ツ，注意和シ的差別：點是直的' },
  { char: 'テ', round: 4, reading: 'te',  hiragana: 'て', kanji: '天', hint: '「天」上兩橫 → テ，和て同源' },
  { char: 'ト', round: 4, reading: 'to',  hiragana: 'と', kanji: '止', hint: '「止」右半一豎一短橫 → ト，和と同源' },

const intervals = [0, 3, 8, 20, 40];
function getSessionLimit() { return currentRound === 0 ? 50 : 30; }
const STORAGE_KANA = 'katakana_kana_progress';
const STORAGE_VOCAB = 'katakana_vocab_progress';
let kanaProgress = {};
let vocabProgress = {};
function loadProgress() {
  try {
    kanaProgress = JSON.parse(localStorage.getItem(STORAGE_KANA) || '{}');
    vocabProgress = JSON.parse(localStorage.getItem(STORAGE_VOCAB) || '{}');
  } catch(e) { kanaProgress = {}; vocabProgress = {}; }
}
function saveProgress() {
  localStorage.setItem(STORAGE_KANA, JSON.stringify(kanaProgress));
  localStorage.setItem(STORAGE_VOCAB, JSON.stringify(vocabProgress));
}

let totalCorrect = 0;

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetScore() {
  totalAnswered = 0; totalCorrect = 0; streak = 0; sessionCount = 0;
  document.getElementById('scoreCorrect').textContent = 0;
  document.getElementById('scoreTotal').textContent = 0;
  document.getElementById('scoreStreak').textContent = 0;
  document.getElementById('progressFill').style.width = '0%';
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = totalCorrect;
  document.getElementById('scoreTotal').textContent = totalAnswered;
  document.getElementById('scoreStreak').textContent = streak;
}

function updateProgress() {
  const lim = getSessionLimit();
  document.getElementById('progressFill').style.width = (Math.min(sessionCount / lim, 1) * 100) + '%';
}

function buildKanaQueue(round) {
  const cards = round === 0 ? katakanaCards : katakanaCards.filter(c => c.round <= round);
  return cards.map(c => {
    const dist = round === 0 ? 0 : round - c.round;
    return { ...c, level: kanaProgress[c.char] ?? Math.min(dist, intervals.length - 1), nextReview: 0 };
  });
}

function setRound(n) {
  currentRound = n;
  document.querySelectorAll('.round-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.round) === n);
  });
  if (currentSection === 'kana') {
    queue = buildKanaQueue(n);
  } else {
    buildVocabQueue();
  }
  resetScore();
  nextCard();
}

function pickFromQueue() {
  const due = queue.filter(c => c.nextReview <= sessionCount);
  if (!due.length) return null;
  const sorted = [...due].sort((a, b) => a.level !== b.level ? a.level - b.level : a.nextReview - b.nextReview);
  const pool = sorted.slice(0, Math.min(3, sorted.length));
  return pool[Math.floor(Math.random() * pool.length)];
}

function advanceSRS(item, correct) {
  if (correct) {
    item.level = Math.min((item.level || 0) + 1, intervals.length - 1);
    streak++; totalCorrect++;
  } else {
    item.level = 0; streak = 0;
  }
  item.nextReview = sessionCount + intervals[item.level];
  if (item.char) kanaProgress[item.char] = item.level;
  if (item.word) vocabProgress[item.word] = item.level;
  saveProgress();
  totalAnswered++; sessionCount++;
  updateScore();
}

function normalizeRomaji(s) {
  return s.trim().toLowerCase().replace(/\s+/g, '').replace(/oo/g, 'o').replace(/uu/g, 'u').replace(/nn/g, 'n');
}

  currentSection = section;

  document.getElementById('tabVocab').classList.toggle('active', section === 'vocab');
  document.getElementById('kanaModes').style.display = section === 'kana' ? 'flex' : 'none';
  document.getElementById('roundFilter').style.display = 'flex';
  document.getElementById('vocabToggle').style.display = section === 'vocab' ? 'flex' : 'none';
  document.getElementById('topicFilter').style.display = section === 'vocab' ? 'flex' : 'none';
  resetScore();
  if (section === 'kana') {
    queue = buildKanaQueue(currentRound);
    nextCard();
  } else {
    buildVocabQueue();
    nextCard();
  }
}

function buildVocabQueue() {
  let filtered = currentTopic === 'all' ? vocabCards : vocabCards.filter(v => v.topic === currentTopic);
  if (currentRound > 0) filtered = filtered.filter(v => v.round <= currentRound);
  vocabQueue = filtered.map(c => ({ ...c, level: vocabProgress[c.word] ?? (alreadyKnown.has(c.word) ? 2 : 0), nextReview: 0 }));
  queue = vocabQueue;
}

}

  if (answered) return;
  answered = true;
  const correct = currentCard[field];
  const isCorrect = chosen === correct;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');
  advanceSRS(currentCard, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${correct}」`;
  document.getElementById('hintText').textContent = '💡 ' + currentCard.hint;
  document.getElementById('nextBtn').classList.add('visible');
}

// ═══════════════════════════════
// MODE SWITCHING
// ═══════════════════════════════
function switchMode(mode) {
  currentMode = mode;
  ['tab1','tab2','tab3','tab4'].forEach(id => document.getElementById(id).classList.remove('active'));
  const tabMap = { 'char-to-reading': 'tab1', 'char-to-input': 'tab2', 'reading-to-char': 'tab3', 'reading-to-input': 'tab4' };
  document.getElementById(tabMap[mode]).classList.add('active');
  queue = buildKanaQueue(currentRound);
  resetScore(); nextCard();
}

// ═══════════════════════════════
// NEXT CARD
// ═══════════════════════════════
function nextCard() {
  answered = false;
  const lim = getSessionLimit();
  if (sessionCount >= lim) { showResult(); return; }
  currentCard = pickFromQueue();
  if (!currentCard) { showResult(); return; }

  if (currentSection === 'vocab') {
    if (vocabDir === 'jp-to-zh') renderVocabJpToZh();
    else renderVocabZhToJp();
    updateProgress(); return;
  }
  if (currentMode === 'char-to-reading') renderCharToReadingMultiple();
  else if (currentMode === 'char-to-input') renderCharToInput();
  else if (currentMode === 'reading-to-char') renderReadingToCharMultiple();
  else renderReadingToInput();

  updateProgress();
}

// ═══════════════════════════════
// MODE 1: 字→讀音 選擇題
// ═══════════════════════════════
function getReadingDistractors(card) {
  const correct = card.reading;
  const correctChar = card.char;
  const similarChars = new Set();
  for (const group of similarGroups) {
    if (group.includes(correctChar)) group.forEach(c => { if (c !== correctChar) similarChars.add(c); });
  }
  const similarReadings = katakanaCards
    .filter(c => similarChars.has(c.char) && c.reading !== correct)
    .map(c => c.reading);
  const others = shuffle(katakanaCards.map(c => c.reading).filter(r => r !== correct && !similarReadings.includes(r)));
  return shuffle([correct, ...shuffle([...similarReadings, ...others]).slice(0, 3)]);
}

  const options = getReadingDistractors(currentCard);
  document.getElementById('quizContent').innerHTML = `
    <div class="question-type">這個片假名怎麼讀？</div>

    <div class="hint" id="hintText"></div>
    <div class="options">
      ${options.map(opt => `<button class="option-btn reading" onclick="checkCharToReading('${opt}', this)">${opt}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextCard()">下一題 →</button>
  `;
}

// ═══════════════════════════════
// MODE 3: 讀音→字 選擇題
// ═══════════════════════════════
function getCharDistractors(card) {
  const correct = card.char;
  const similarChars = new Set();
  for (const group of similarGroups) {
    if (group.includes(correct)) group.forEach(c => { if (c !== correct) similarChars.add(c); });
  }
  const similarPool = katakanaCards.filter(c => similarChars.has(c.char) && c.char !== correct).map(c => c.char);
  const others = shuffle(katakanaCards.map(c => c.char).filter(c => c !== correct && !similarPool.includes(c)));
  return shuffle([correct, ...shuffle([...similarPool, ...others]).slice(0, 3)]);
}

// ═══════════════════════════════
// RESULT
// ═══════════════════════════════
function showResult() {
  updateProgress();
  const pct = totalAnswered ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  let emoji, msg, sub;
  if (pct >= 90) { emoji = '🎌'; msg = '完美！'; sub = `正確率 ${pct}%，繼續保持！`; }
  else if (pct >= 70) { emoji = '👏'; msg = '很好！'; sub = `正確率 ${pct}%，再練幾次就能鞏固。`; }
  else { emoji = '📖'; msg = '繼續練習！'; sub = `正確率 ${pct}%，間隔重複就是要反覆來。`; }
  document.getElementById('quizContent').innerHTML = `
    <div class="result-screen">
      <div class="big-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${sub}<br><br>正確 ${totalCorrect} / ${totalAnswered} 題</p>
      <button class="restart-btn" onclick="restart()">再練一次</button>
    </div>
  `;
}

function restart() {
  if (currentSection === 'kana') {
    queue = buildKanaQueue(currentRound);
  } else {
    buildVocabQueue();
  }
  resetScore(); nextCard();
}
