<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平假名記憶測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #f5f0e8;
  --accent: #c0392b;
  --soft: #8b7355;
  --card: #faf7f2;
  --success: #27ae60;
  --fail: #c0392b;
  --neutral: #7f8c8d;
  --border: rgba(139,115,85,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  background-image: radial-gradient(ellipse at 20% 20%, rgba(192,57,43,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(139,115,85,0.08) 0%, transparent 50%);
}

/* ── Section tabs ── */
.section-tabs {
  display: flex;
  gap: 0;
  max-width: 360px;
  width: 100%;
  margin-bottom: 20px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.section-tab {
  flex: 1;
  padding: 12px 8px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
}
.section-tab:last-child { border-right: none; }
.section-tab.active {
  background: var(--ink);
  color: var(--paper);
  font-weight: 500;
}

/* ── Mode toggle ── */
.mode-toggle {
  display: flex;
  gap: 8px;
  max-width: 360px;
  width: 100%;
  margin-bottom: 18px;
  background: rgba(0,0,0,0.06);
  border-radius: 10px;
  padding: 4px;
}
.mode-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 7px;
  font-size: 0.78rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: transparent;
  color: var(--soft);
  transition: all 0.2s;
}
.mode-btn.active {
  background: white;
  color: var(--ink);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  font-weight: 500;
}

/* ── Progress ── */
.progress-bar {
  width: 100%;
  max-width: 360px;
  height: 3px;
  background: rgba(0,0,0,0.08);
  border-radius: 2px;
  margin-bottom: 18px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--soft));
}
.sr-badge {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 0.6rem;
  color: var(--soft);
  opacity: 0.5;
  letter-spacing: 0.08em;
}
.question-type {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 14px;
  font-weight: 500;
}
.main-char {
  font-family: 'Noto Serif JP', serif;
  font-size: 4.5rem;
  text-align: center;
  line-height: 1;
  margin: 8px 0 6px;
  color: var(--ink);
}
.main-meaning {
  font-size: 1.5rem;
  text-align: center;
  line-height: 1.3;
  margin: 8px 0 6px;
  color: var(--ink);
  font-weight: 400;
}
.hint { font-size: 0.73rem; color: var(--neutral); text-align: center; margin-bottom: 20px; min-height: 16px; font-style: italic; }

/* ── Options ── */
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.option-btn {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 8px;
  font-size: 0.88rem;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
  text-align: center;
  line-height: 1.3;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(192,57,43,0.04); transform: translateY(-1px); }
.option-btn.correct { background: rgba(39,174,96,0.1); border-color: var(--success); color: var(--success); font-weight: 500; }
.option-btn.wrong { background: rgba(192,57,43,0.08); border-color: var(--fail); color: var(--fail); }
.option-btn:disabled { cursor: default; }
.option-btn.vocab { font-family: 'Noto Sans TC', sans-serif; font-size: 0.82rem; }

/* ── Input ── */
.input-wrap { margin-bottom: 12px; }
.romaji-input {
  width: 100%;
  padding: 13px 16px;
  font-size: 1rem;
  font-family: 'Noto Sans TC', sans-serif;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
  letter-spacing: 0.08em;
}
.romaji-input:focus { border-color: var(--accent); }
.romaji-input.correct { border-color: var(--success); background: rgba(39,174,96,0.06); color: var(--success); }
.romaji-input.wrong { border-color: var(--fail); background: rgba(192,57,43,0.06); }
.input-hint { font-size: 0.68rem; color: var(--neutral); text-align: center; margin-bottom: 10px; font-style: italic; }

/* ── Buttons ── */
.submit-btn {
  width: 100%;
  background: var(--soft);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 0.85rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.submit-btn:hover { background: var(--accent); }
.next-btn {
  width: 100%;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 0.85rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  display: none;
}
.next-btn:hover { background: var(--accent); transform: translateY(-1px); }
.next-btn.visible { display: block; }

/* ── Feedback ── */
.feedback {
  min-height: 44px;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.8rem;
  line-height: 1.5;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.feedback.show-correct { background: rgba(39,174,96,0.08); color: var(--success); }
.feedback.show-wrong { background: rgba(192,57,43,0.06); color: var(--fail); }

/* ── Score ── */
.score-display {
  display: flex;
  justify-content: space-between;
  max-width: 360px;
  width: 100%;
  padding: 0 4px;
}
.score-item { text-align: center; font-size: 0.68rem; color: var(--neutral); letter-spacing: 0.05em; }
.score-num { display: block; font-size: 1.3rem; font-weight: 500; color: var(--ink); font-family: 'Noto Serif JP', serif; }

/* ── Result ── */
.result-screen { text-align: center; padding: 16px 8px; }
.result-screen .big-emoji { font-size: 3rem; margin: 8px 0; }
.result-screen h2 { font-size: 1.05rem; font-weight: 500; margin-bottom: 8px; }
.result-screen p { font-size: 0.8rem; color: var(--soft); margin-bottom: 18px; line-height: 1.6; }
.restart-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 28px;
  font-size: 0.85rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.restart-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* ── Topic filter ── */
.topic-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-width: 360px;
  width: 100%;
  margin-bottom: 14px;
}
.topic-btn {
  padding: 5px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.72rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: white;
  color: var(--soft);
  transition: all 0.15s;
}
.topic-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-weight: 500;
}

/* ── Hint toggle ── */
.hint-toggle-wrap {
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  display: flex;
  justify-content: flex-end;
}
.hint-toggle-btn {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.72rem;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: white;
  color: var(--soft);
  transition: all 0.15s;
}
.hint-toggle-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-weight: 500;
}

/* ── Round filter ── */
.round-filter {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.round-btn {
  flex: 1;
  padding: 9px 2px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.round-btn:last-child { border-right: none; }
.round-btn.active { background: var(--accent); color: white; font-weight: 500; }
</style>
</head>
<body>

<!-- Section tabs -->
<div class="section-tabs">
  <button class="section-tab active" id="tabHiragana" onclick="switchSection('hiragana')">五十音</button>
  <button class="section-tab" id="tabVocab" onclick="switchSection('vocab')">單字</button>
</div>


<!-- 輪次選擇 -->
<div class="round-filter" id="roundFilter">
  <button class="round-btn active" data-round="1" onclick="setRound(1)">第1輪</button>
  <button class="round-btn" data-round="2" onclick="setRound(2)">第2輪</button>
  <button class="round-btn" data-round="3" onclick="setRound(3)">第3輪</button>
  <button class="round-btn" data-round="4" onclick="setRound(4)">第4輪</button>
  <button class="round-btn" data-round="5" onclick="setRound(5)">第5輪</button>
  <button class="round-btn" data-round="0" onclick="setRound(0)">全部</button>
</div>
<!-- Mode toggle (五十音 only) -->
<div class="mode-toggle" id="modeToggle">
  <button class="mode-btn active" id="btnMultiple" onclick="setMode('multiple')">選擇題</button>
  <button class="mode-btn" id="btnInput" onclick="setMode('input')">輸入題</button>
</div>

<!-- Hint toggle (五十音 only) -->
<div class="hint-toggle-wrap" id="hintToggleWrap">
  <button class="hint-toggle-btn" id="hintToggleBtn" onclick="toggleHint()">提示：關</button>
</div>

<!-- Vocab direction toggle -->
<div class="mode-toggle" id="vocabToggle" style="display:none;">
  <button class="mode-btn active" id="btnJpToZh" onclick="setVocabDir('jp-to-zh')">日文→中文</button>
  <button class="mode-btn" id="btnZhToJp" onclick="setVocabDir('zh-to-jp')">中文→日文</button>
</div>

<!-- Topic filter (vocab only) -->
<div class="topic-filter" id="topicFilter" style="display:none;">
  <button class="topic-btn active" onclick="setTopic('all')">全部</button>
  <button class="topic-btn" onclick="setTopic('greeting')">🗣 問候</button>
  <button class="topic-btn" onclick="setTopic('food')">🍱 飲食</button>
  <button class="topic-btn" onclick="setTopic('family')">👨‍👩‍👧‍👦 家族</button>
  <button class="topic-btn" onclick="setTopic('time')">📅 時間</button>
  <button class="topic-btn" onclick="setTopic('color')">🎨 顏色</button>
  <button class="topic-btn" onclick="setTopic('number')">🔢 數字</button>
  <button class="topic-btn" onclick="setTopic('nature')">🌸 自然</button>
  <button class="topic-btn" onclick="setTopic('daily')">💬 日常</button>
  <button class="topic-btn" onclick="setTopic('question')">❓ 疑問詞</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="card" id="mainCard">
  <span class="sr-badge">SRS</span>
  <div id="quizContent"></div>
</div>

<div class="score-display">
  <div class="score-item"><span class="score-num" id="scoreCorrect">0</span>正確</div>
  <div class="score-item"><span class="score-num" id="scoreTotal">0</span>已答</div>
  <div class="score-item"><span class="score-num" id="scoreStreak">0</span>連勝</div>
</div>

const intervals = [0, 3, 8, 20, 40];

const STORAGE_VOCAB = 'hiragana_vocab_progress';
let kanaProgress = {};
let vocabProgress = {};
function loadProgress() {
  try {
    kanaProgress = JSON.parse(localStorage.getItem(STORAGE_KANA) || '{}');
    vocabProgress = JSON.parse(localStorage.getItem(STORAGE_VOCAB) || '{}');
  } catch(e) { kanaProgress = {}; vocabProgress = {}; }
}
function saveProgress() {
  localStorage.setItem(STORAGE_KANA, JSON.stringify(kanaProgress));
  localStorage.setItem(STORAGE_VOCAB, JSON.stringify(vocabProgress));
}
function buildHiraganaQueue(round) {
  const filtered = round === 0 ? cards : cards.filter(c => c.round <= round);
  return filtered.map(c => {
    const dist = round === 0 ? 0 : round - c.round;
    return { ...c, level: kanaProgress[c.char] ?? Math.min(dist, intervals.length - 1), nextReview: 0 };
  });
}
function setRound(n) {
  currentRound = n;
  document.querySelectorAll('.round-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.round) === n);
  });
  if (section === 'vocab') {
    const showFilter = n === 0;
    document.getElementById('topicFilter').style.display = showFilter ? 'flex' : 'none';
    if (!showFilter && currentTopic !== 'all') {
      currentTopic = 'all';
      document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.topic-btn').classList.add('active');
    }
  }
  if (section === 'hiragana') {
    hiraganaQueue = buildHiraganaQueue(n);
  } else {
    vocabQueue = getFilteredVocab();
  }
  resetScore();
  nextCard();
}

// UTILS
// ═══════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetScore() {
  totalAnswered = 0; totalCorrect = 0; streak = 0; sessionCount = 0;
  document.getElementById('scoreCorrect').textContent = 0;
  document.getElementById('scoreTotal').textContent = 0;
  document.getElementById('scoreStreak').textContent = 0;
  document.getElementById('progressFill').style.width = '0%';
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = totalCorrect;
  document.getElementById('scoreTotal').textContent = totalAnswered;
  document.getElementById('scoreStreak').textContent = streak;
}

function updateProgress() {
  const lim = getSessionLimit();
  document.getElementById('progressFill').style.width = (Math.min(sessionCount / lim, 1) * 100) + '%';
}

function pickFromQueue(queue) {
  const due = queue.filter(c => c.nextReview <= sessionCount);
  if (!due.length) return null;
  const sorted = [...due].sort((a, b) => a.level !== b.level ? a.level - b.level : a.nextReview - b.nextReview);
  const pool = sorted.slice(0, Math.min(3, sorted.length));
  return pool[Math.floor(Math.random() * pool.length)];
}

function advanceSRS(item, correct) {
  if (correct) {
    item.level = Math.min((item.level || 0) + 1, intervals.length - 1);
    streak++;
    totalCorrect++;
  } else {
    item.level = 0;
    streak = 0;
  }
  item.nextReview = sessionCount + intervals[item.level];
  if (item.char) kanaProgress[item.char] = item.level;
  if (item.display) vocabProgress[item.display] = item.level;
  saveProgress();
  totalAnswered++;
  sessionCount++;
  updateScore();
}

function getFilteredVocab() {

  return filtered.map(c => {
    const saved = vocabProgress[c.display];
    const level = saved ?? (alreadyKnown.has(c.display) ? 2 : 0);
    const nextReview = saved != null ? 0 : -((recentBatch[c.display] ?? 0) * 5);
    return { ...c, level, nextReview };
  });

function nextCard() {
  answered = false;

  if (section === 'hiragana') {
    currentCard = pickFromQueue(hiraganaQueue);
    if (!currentCard) { showResult(); return; }
    hiraganaMode === 'multiple' ? renderHiraganaMultiple() : renderHiraganaInput();
  } else {
    currentVocab = pickFromQueue(vocabQueue);
    if (!currentVocab) { showResult(); return; }
    renderVocabMultiple();
  }
  updateProgress();
}

// ═══════════════════════════════
// HIRAGANA: MULTIPLE CHOICE
// ═══════════════════════════════
function getHiraganaDistractors(card) {
  const correct = card.reading;
  const correctChar = card.char;

  // 找出跟這個字形近的字
  const similarChars = new Set();
  for (const group of similarGroups) {
    if (group.includes(correctChar)) {
      group.forEach(c => { if (c !== correctChar) similarChars.add(c); });
    }
  }

  // 從形近字裡找 reading 作為干擾選項
  const similarReadings = cards
    .filter(c => similarChars.has(c.char) && c.reading !== correct)
    .map(c => c.reading);

  // 其他隨機選項
  const otherReadings = shuffle(
    cards.map(c => c.reading).filter(r => r !== correct && !similarReadings.includes(r))
  );

  // 優先用形近字，不夠再補隨機
  const distractors = shuffle([...similarReadings, ...otherReadings]).slice(0, 3);
  return shuffle([correct, ...distractors]);
}

function renderHiraganaMultiple() {
  const options = getHiraganaDistractors(currentCard);
  document.getElementById('quizContent').innerHTML = `

}

function checkHiraganaMultiple(chosen, btn) {

  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${correct}」`;

  document.getElementById('nextBtn').classList.add('visible');
}

function normalizeRomaji(s) {
  return s.trim().toLowerCase().replace(/\s+/g, '').replace(/oo/g, 'o').replace(/uu/g, 'u').replace(/nn/g, 'n');
}

function submitHiraganaInput() {
  if (answered) return;
  const inp = document.getElementById('romajiInput');
  if (!inp?.value.trim()) return;
  answered = true;
  const accepted = currentCard.reading.split('／').map(r => normalizeRomaji(r));
  const isCorrect = accepted.includes(normalizeRomaji(inp.value));
  inp.disabled = true;
  inp.classList.add(isCorrect ? 'correct' : 'wrong');
  advanceSRS(currentCard, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${currentCard.reading}」`;
  if (showHint) document.getElementById('hintText').textContent = '💡 ' + currentCard.hint;
  document.getElementById('nextBtn').classList.add('visible');
}

// ═══════════════════════════════
// VOCAB: MULTIPLE CHOICE (both directions)
// ═══════════════════════════════
function getVocabDistractors(vocab) {
  const correct = vocabDir === 'jp-to-zh' ? vocab.meaning : vocab.display;
  const getVal = v => vocabDir === 'jp-to-zh' ? v.meaning : v.display;

  // 同主題的干擾選項（排除正確答案）
  const sameTopicPool = shuffle(
    vocabCards
      .filter(v => v.topic === vocab.topic && getVal(v) !== correct)
      .map(getVal)
  );

  // 其他主題補足
  const otherPool = shuffle(
    vocabCards
      .filter(v => v.topic !== vocab.topic && getVal(v) !== correct)
      .map(getVal)
  );

  // 優先取至少 2 個同主題，再補其他
  const samePick = sameTopicPool.slice(0, 2);
  const otherPick = otherPool.slice(0, 3 - samePick.length);
  const distractors = shuffle([...samePick, ...otherPick]).slice(0, 3);

  return shuffle([correct, ...distractors]);
}

function renderVocabMultiple() {
  const options = getVocabDistractors(currentVocab);
  const question = vocabDir === 'jp-to-zh' ? currentVocab.display : currentVocab.meaning;
  const qtype = vocabDir === 'jp-to-zh' ? '這個日文是什麼意思？' : '這個日文怎麼說？';
  const isJp = vocabDir === 'jp-to-zh';

  document.getElementById('quizContent').innerHTML = `
    <div class="question-type">${qtype}</div>
    <div class="${isJp ? 'main-char' : 'main-meaning'}" style="${isJp ? 'font-size:2.8rem' : ''}">${question}</div>
    <div class="hint" id="hintText"></div>
    <div class="options">
      ${options.map(opt => `<button class="option-btn vocab" onclick="checkVocabMultiple('${opt.replace(/'/g, "\\'")}', this)">${opt}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextCard()">下一題 →</button>
  `;
}

function checkVocabMultiple(chosen, btn) {
  if (answered) return;
  answered = true;
  const correct = vocabDir === 'jp-to-zh' ? currentVocab.meaning : currentVocab.display;
  const isCorrect = chosen === correct;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');
  advanceSRS(currentVocab, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  const hint = vocabDir === 'jp-to-zh'
    ? `${currentVocab.display}（${currentVocab.reading}）`
    : `${currentVocab.meaning} → ${currentVocab.display}`;
  fb.innerHTML = isCorrect ? `✓ 正確！${hint}` : `✗ 正確是「${correct}」`;
  document.getElementById('hintText').textContent = `💡 ${currentVocab.display}（${currentVocab.reading}）`;
  document.getElementById('nextBtn').classList.add('visible');
}

// RESULT
// ═══════════════════════════════
function showResult() {
  updateProgress();
  const pct = totalAnswered ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  let emoji, msg, sub;
  if (pct >= 90) { emoji = '🎌'; msg = '完美！'; sub = `正確率 ${pct}%，繼續保持！`; }
  else if (pct >= 70) { emoji = '👏'; msg = '很好！'; sub = `正確率 ${pct}%，再練幾次就能鞏固。`; }
  else { emoji = '📖'; msg = '繼續練習！'; sub = `正確率 ${pct}%，間隔重複就是要反覆來。`; }

  document.getElementById('quizContent').innerHTML = `
    <div class="result-screen">
      <div class="big-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${sub}<br><br>正確 ${totalCorrect} / ${totalAnswered} 題</p>
      <button class="restart-btn" onclick="restartCurrent()">再練一次</button>
    </div>
  `;
}

function restartCurrent() {
  if (section === 'hiragana') {
    hiraganaQueue = buildHiraganaQueue(currentRound);
  } else {
    vocabQueue = getFilteredVocab();
  }
  resetScore();
  nextCard();
}
