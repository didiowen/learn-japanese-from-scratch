<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平假名記憶測驗</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a2e;
  --paper: #f5f0e8;
  --accent: #c0392b;
  --soft: #8b7355;
  --card: #faf7f2;
  --success: #27ae60;
  --fail: #c0392b;
  --neutral: #7f8c8d;
  --border: rgba(139,115,85,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px 40px;
  background-image: radial-gradient(ellipse at 20% 20%, rgba(192,57,43,0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(139,115,85,0.08) 0%, transparent 50%);
}

/* ── Section tabs ── */
.section-tabs {
  display: flex;
  gap: 0;
  max-width: 360px;
  width: 100%;
  margin-bottom: 20px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.section-tab {
  flex: 1;
  padding: 12px 8px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 1rem;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
}
.section-tab:last-child { border-right: none; }
.section-tab.active {
  background: var(--ink);
  color: var(--paper);
  font-weight: 400;
}

/* ── Mode tabs（四格，五十音用）── */
.mode-tabs {
  display: flex;
  gap: 0;
  max-width: 360px;
  width: 100%;
  margin-bottom: 18px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.mode-tab {
  flex: 1;
  padding: 10px 4px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  letter-spacing: 0.02em;
  line-height: 1.3;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
  text-align: center;
}
.mode-tab:last-child { border-right: none; }
.mode-tab.active {
  background: var(--ink);
  color: var(--paper);
  font-weight: 400;
}

/* ── Vocab mode toggle（單字方向，保留） ── */
.mode-toggle {
  display: flex;
  gap: 8px;
  max-width: 360px;
  width: 100%;
  margin-bottom: 18px;
  background: rgba(0,0,0,0.06);
  border-radius: 10px;
  padding: 4px;
}
.mode-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 7px;
  font-size: 0.95rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: transparent;
  color: var(--soft);
  transition: all 0.2s;
}
.mode-btn.active {
  background: white;
  color: var(--ink);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  font-weight: 400;
}

/* ── Progress ── */
.progress-bar {
  width: 100%;
  max-width: 360px;
  height: 3px;
  background: rgba(0,0,0,0.08);
  border-radius: 2px;
  margin-bottom: 18px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--soft));
}
.sr-badge {
  position: absolute;
  top: 12px; right: 14px;
  font-size: 0.75rem;
  color: var(--soft);
  opacity: 0.5;
  letter-spacing: 0.08em;
}
.question-type {
  font-size: 0.85rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--soft);
  margin-bottom: 14px;
  font-weight: 400;
}
.main-char {
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 4.5rem;
  text-align: center;
  line-height: 1;
  margin: 8px 0 6px;
  color: var(--ink);
}
.main-meaning {
  font-size: 1.8rem;
  text-align: center;
  line-height: 1.3;
  margin: 8px 0 6px;
  color: var(--ink);
  font-weight: 400;
}
.hint { font-size: 0.88rem; color: var(--neutral); text-align: center; margin-bottom: 20px; min-height: 16px; font-style: italic; }

/* ── Options ── */
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.option-btn {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 8px;
  font-size: 1.05rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
  text-align: center;
  line-height: 1.3;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(192,57,43,0.04); transform: translateY(-1px); }
.option-btn.correct { background: rgba(39,174,96,0.1); border-color: var(--success); color: var(--success); font-weight: 400; }
.option-btn.wrong { background: rgba(192,57,43,0.08); border-color: var(--fail); color: var(--fail); }
.option-btn:disabled { cursor: default; }
.option-btn.vocab { font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif; font-size: 1rem; }

/* ── Input ── */
.input-wrap { margin-bottom: 12px; }
.romaji-input {
  width: 100%;
  padding: 13px 16px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: white;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  text-align: center;
  letter-spacing: 0.08em;
}
.romaji-input:focus { border-color: var(--accent); }
.romaji-input.correct { border-color: var(--success); background: rgba(39,174,96,0.06); color: var(--success); }
.romaji-input.wrong { border-color: var(--fail); background: rgba(192,57,43,0.06); }
.input-hint { font-size: 0.85rem; color: var(--neutral); text-align: center; margin-bottom: 10px; font-style: italic; }

/* ── Buttons ── */
.submit-btn {
  width: 100%;
  background: var(--soft);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.submit-btn:hover { background: var(--accent); }
.next-btn {
  width: 100%;
  background: var(--ink);
  color: var(--paper);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
  display: none;
}
.next-btn:hover { background: var(--accent); transform: translateY(-1px); }
.next-btn.visible { display: block; }

/* ── Feedback ── */
.feedback {
  min-height: 44px;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.95rem;
  line-height: 1.5;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.feedback.show-correct { background: rgba(39,174,96,0.08); color: var(--success); }
.feedback.show-wrong { background: rgba(192,57,43,0.06); color: var(--fail); }

/* ── Score ── */
.score-display {
  display: flex;
  justify-content: space-between;
  max-width: 360px;
  width: 100%;
  padding: 0 4px;
}
.score-item { text-align: center; font-size: 0.85rem; color: var(--neutral); letter-spacing: 0.05em; }
.score-num { display: block; font-size: 1.5rem; font-weight: 400; color: var(--ink); font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif; }

/* ── Result ── */
.result-screen { text-align: center; padding: 16px 8px; }
.result-screen .big-emoji { font-size: 3rem; margin: 8px 0; }
.result-screen h2 { font-size: 1.2rem; font-weight: 400; margin-bottom: 8px; }
.result-screen p { font-size: 0.95rem; color: var(--soft); margin-bottom: 18px; line-height: 1.6; }
.restart-btn {
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 12px 28px;
  font-size: 1rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
.restart-btn:hover { opacity: 0.88; transform: translateY(-1px); }

/* ── Topic filter ── */
.topic-filter {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  max-width: 360px;
  width: 100%;
  margin-bottom: 14px;
}
.topic-btn {
  padding: 5px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.88rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: white;
  color: var(--soft);
  transition: all 0.15s;
}
.topic-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-weight: 400;
}

/* ── Hint toggle ── */
.hint-toggle-wrap {
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  display: flex;
  justify-content: flex-end;
}
.hint-toggle-btn {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 0.88rem;
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  cursor: pointer;
  background: white;
  color: var(--soft);
  transition: all 0.15s;
}
.hint-toggle-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
  font-weight: 400;
}

/* ── Round filter ── */
.round-filter {
  display: flex;
  max-width: 360px;
  width: 100%;
  margin-bottom: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.round-btn {
  flex: 1;
  padding: 9px 2px;
  border: none;
  background: white;
  color: var(--neutral);
  font-family: 'Noto Sans JP', 'Noto Sans TC', sans-serif;
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.2s;
  border-right: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.round-btn:last-child { border-right: none; }
.round-btn.active { background: var(--accent); color: white; font-weight: 400; }

/* ── Nav links ── */
.nav-links {
  display: flex;
  gap: 20px;
  width: 100%;
  max-width: 360px;
  margin-bottom: 12px;
}
.nav-links a {
  color: var(--soft);
  text-decoration: none;
  font-size: 0.85rem;
  letter-spacing: 0.03em;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--accent); }
</style>
</head>
<body>

<nav class="nav-links">
  <a href="index.html">← 首頁</a>
  <a href="notes/">📖 學習筆記</a>
</nav>

<!-- Section tabs -->
<div class="section-tabs">
  <button class="section-tab active" id="tabHiragana" onclick="switchSection('hiragana')">五十音</button>
  <button class="section-tab" id="tabVocab" onclick="switchSection('vocab')">單字</button>
</div>


<!-- 輪次選擇 -->
<div class="round-filter" id="roundFilter">
  <button class="round-btn active" data-round="1" onclick="setRound(1)">第1輪</button>
  <button class="round-btn" data-round="2" onclick="setRound(2)">第2輪</button>
  <button class="round-btn" data-round="3" onclick="setRound(3)">第3輪</button>
  <button class="round-btn" data-round="4" onclick="setRound(4)">第4輪</button>
  <button class="round-btn" data-round="5" onclick="setRound(5)">第5輪</button>
  <button class="round-btn" data-round="0" onclick="setRound(0)">全部</button>
</div>
<!-- Mode tabs (五十音 only) -->
<div class="mode-tabs" id="kanaModes">
  <button class="mode-tab active" id="tab1" onclick="switchMode('char-to-reading')">字→讀音<br>選擇</button>
  <button class="mode-tab" id="tab2" onclick="switchMode('char-to-input')">字→讀音<br>輸入</button>
  <button class="mode-tab" id="tab3" onclick="switchMode('reading-to-char')">讀音→字<br>選擇</button>
  <button class="mode-tab" id="tab4" onclick="switchMode('reading-to-input')">讀音→字<br>輸入</button>
</div>

<!-- Hint toggle (五十音 only) -->
<div class="hint-toggle-wrap" id="hintToggleWrap">
  <button class="hint-toggle-btn" id="hintToggleBtn" onclick="toggleHint()">提示：關</button>
</div>

<!-- Vocab direction toggle -->
<div class="mode-toggle" id="vocabToggle" style="display:none;">
  <button class="mode-btn active" id="btnJpToZh" onclick="setVocabDir('jp-to-zh')">日文→中文</button>
  <button class="mode-btn" id="btnZhToJp" onclick="setVocabDir('zh-to-jp')">中文→日文</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="card" id="mainCard">
  <span class="sr-badge">SRS</span>
  <div id="quizContent"></div>
</div>

<div class="score-display">
  <div class="score-item"><span class="score-num" id="scoreCorrect">0</span>正確</div>
  <div class="score-item"><span class="score-num" id="scoreTotal">0</span>已答</div>
  <div class="score-item"><span class="score-num" id="scoreStreak">0</span>連勝</div>
</div>

<script>
// ═══════════════════════════════
// DATA
// ═══════════════════════════════
const cards = [
  { char: 'す', round: 3, reading: 'su', katakana: 'ス', hint: '「寸」台語念 tshùn，母音 u 對應' },
  { char: 'み', round: 4, reading: 'mi', katakana: 'ミ', hint: '「美」台語念 bí，吳音鼻音化' },
  { char: 'ま', round: 4, reading: 'ma', katakana: 'マ', hint: '「末」台語念 buāt；媽媽的 ma' },
  { char: 'せ', round: 3, reading: 'se', katakana: 'セ', hint: '「世」台語發 sè，漢字字形幾乎沒變' },
  { char: 'ん', round: 1, reading: 'n', katakana: 'ン', hint: '「无」通「亡」，台語念 bông，取韻尾 n；打字打 nn' },
  { char: 'お', round: 1, reading: 'o', katakana: 'オ', hint: '「於」台語古音發「oo」' },
  { char: 'い', round: 1, reading: 'i', katakana: 'イ', hint: '「以」台語念 i，兩根豎線並排' },
  { char: 'し', round: 3, reading: 'shi', katakana: 'シ', hint: '「之」台語念 tsi，接近 shi；釣魚線形狀' },
  { char: 'た', round: 4, reading: 'ta', katakana: 'タ', hint: '「太」台語發 tài，去韻尾 i 得「ta」' },
  { char: 'だ', round: 4, reading: 'da', katakana: 'ダ', hint: '「太＋゛」た加濁點 t→d' },
  { char: 'う', round: 1, reading: 'u', katakana: 'ウ', hint: '「宇」台語念 u，像小碗裝 udon' },
  { char: 'ぶ', round: 5, reading: 'bu', katakana: 'ブ', hint: '「不＋゛」台語「武」bú 接近 bu' },
  { char: 'じ', round: 3, reading: 'ji', katakana: 'ジ', hint: '「之＋゛」し加濁點，聲帶一震動' },
  { char: 'ほ', round: 5, reading: 'ho', katakana: 'ホ', hint: '「保」台語發 pó，古代念 po，演變成 ho' },
  { char: 'と', round: 4, reading: 'to', katakana: 'ト', hint: '「止」台語念 tóo；Tokyo 釘子釘地圖' },
  { char: 'あ', round: 1, reading: 'a', katakana: 'ア', hint: '「安」台語念 an，張嘴就來' },
  { char: 'り', round: 1, reading: 'ri', katakana: 'リ', hint: '「利」台語念 lī，流利的線' },
  { char: 'が', round: 2, reading: 'ga', katakana: 'ガ', hint: '「加＋゛」か加濁點 k→g' },
  { char: 'こ', round: 2, reading: 'ko', katakana: 'コ', hint: '「己」台語「古」發 kóo，ko音由此來' },
  { char: 'れ', round: 1, reading: 're', katakana: 'レ', hint: '「礼」台語發 lé；漢字右邊勾對應假名底部勾' },
  { char: 'ち', round: 4, reading: 'chi', katakana: 'チ', hint: '「知」粵語「知」zi，接近 chi；字形像問號' },
  { char: 'て', round: 4, reading: 'te', katakana: 'テ', hint: '「天」台語念 tien，去「i,n」得「te」' },
  { char: 'ぼ', round: 5, reading: 'bo', katakana: 'ボ', hint: '「保＋゛」ほ加濁點；台語「無」bô → bo' },
  { char: 'く', round: 2, reading: 'ku', katakana: 'ク', hint: '「久」台語念 kú' },
  { char: 'は', round: 5, reading: 'ha／wa', katakana: 'ハ', hint: '「波」中古音「pha」去 p 得「ha」；當助詞念 wa' },
  { char: 'か', round: 2, reading: 'ka', katakana: 'カ', hint: '「加」台語念 ka' },
  { char: 'さ', round: 3, reading: 'sa', katakana: 'サ', hint: '「左」台語「差」tsa，去 t 得 sa' },
  { char: 'に', round: 2, reading: 'ni', katakana: 'ニ', hint: '「仁」吳音「にん nin」去韻尾 n 得「ni」' },

  { char: 'な', round: 2, reading: 'na', katakana: 'ナ', hint: '「奈」台語發 nāi，去韻尾 i 得「na」' },
  { char: 'き', round: 2, reading: 'ki', katakana: 'キ', hint: '「幾」台語念 kí' },
  { char: 'ゅ', round: 3, reading: 'yu', katakana: 'ュ', hint: '「由（小）」小字跟前面合讀，母音變 u' },

  { char: 'ば', round: 5, reading: 'ba', katakana: 'バ', hint: '「波＋゛」は加濁點 h→b' },
  { char: 'わ', round: 3, reading: 'wa', katakana: 'ワ', hint: '「和」上古音發 hâ；漢字右邊口對應假名封閉彎' },
  { char: 'の', round: 2, reading: 'no', katakana: 'ノ', hint: '「乃」中古音「nó」；像漩渦帶尾巴' },

  { char: 'ざ', round: 3, reading: 'za', katakana: 'ザ', hint: '「左＋゛」さ加濁點 s→z' },
  { char: 'ね', round: 2, reading: 'ne', katakana: 'ネ', hint: '「祢」台語發 né' },
  { char: 'ぜ', round: 3, reading: 'ze', katakana: 'ゼ', hint: '「世＋゛」せ加濁點，Zero → ze' },
  { char: 'ど', round: 4, reading: 'do', katakana: 'ド', hint: '「止＋゛」と加濁點 t→d' },
  { char: 'む', round: 4, reading: 'mu', katakana: 'ム', hint: '「武」台語念 bú，吳音鼻音化' },
  { char: 'め', round: 4, reading: 'me', katakana: 'メ', hint: '「女」台語「妹」念 bē，母音 e 對應' },

const intervals = [0, 3, 8, 20, 40];
const STORAGE_KANA = 'hiragana_kana_progress';
const STORAGE_VOCAB = 'hiragana_vocab_progress';
let kanaProgress = {};
let vocabProgress = {};
function loadProgress() {
  try {
    kanaProgress = JSON.parse(localStorage.getItem(STORAGE_KANA) || '{}');
    vocabProgress = JSON.parse(localStorage.getItem(STORAGE_VOCAB) || '{}');
  } catch(e) { kanaProgress = {}; vocabProgress = {}; }
}
function saveProgress() {
  localStorage.setItem(STORAGE_KANA, JSON.stringify(kanaProgress));
  localStorage.setItem(STORAGE_VOCAB, JSON.stringify(vocabProgress));
}
function buildHiraganaQueue(round) {
  const filtered = round === 0 ? cards : cards.filter(c => c.round <= round);
  return filtered.map(c => {
    const dist = round === 0 ? 0 : round - c.round;
    return { ...c, level: kanaProgress[c.char] ?? Math.min(dist, intervals.length - 1), nextReview: 0 };
  });
}
function setRound(n) {
  currentRound = n;
  document.querySelectorAll('.round-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.round) === n);
  });
  if (section === 'hiragana') {
    hiraganaQueue = buildHiraganaQueue(n);
  } else {
    vocabQueue = getFilteredVocab();
  }
  resetScore();
  nextCard();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetScore() {
  totalAnswered = 0; totalCorrect = 0; streak = 0; sessionCount = 0;
  document.getElementById('scoreCorrect').textContent = 0;
  document.getElementById('scoreTotal').textContent = 0;
  document.getElementById('scoreStreak').textContent = 0;
  document.getElementById('progressFill').style.width = '0%';
}

function updateScore() {
  document.getElementById('scoreCorrect').textContent = totalCorrect;
  document.getElementById('scoreTotal').textContent = totalAnswered;
  document.getElementById('scoreStreak').textContent = streak;
}

function updateProgress() {
  const lim = getSessionLimit();
  document.getElementById('progressFill').style.width = (Math.min(sessionCount / lim, 1) * 100) + '%';
}

function pickFromQueue(queue) {
  const due = queue.filter(c => c.nextReview <= sessionCount);
  if (!due.length) return null;
  const sorted = [...due].sort((a, b) => a.level !== b.level ? a.level - b.level : a.nextReview - b.nextReview);
  const pool = sorted.slice(0, Math.min(3, sorted.length));
  return pool[Math.floor(Math.random() * pool.length)];
}

function advanceSRS(item, correct) {
  if (correct) {
    item.level = Math.min((item.level || 0) + 1, intervals.length - 1);
    streak++;
    totalCorrect++;
  } else {
    item.level = 0;
    streak = 0;
  }
  item.nextReview = sessionCount + intervals[item.level];
  if (item.char) kanaProgress[item.char] = item.level;
  if (item.display) vocabProgress[item.display] = item.level;
  saveProgress();
  totalAnswered++;
  sessionCount++;
  updateScore();
}

function switchSection(s) {
  section = s;

  document.getElementById('tabVocab').classList.toggle('active', s === 'vocab');

  document.getElementById('vocabToggle').style.display = s === 'vocab' ? 'flex' : 'none';
  document.getElementById('roundFilter').style.display = 'flex';

  if (s === 'hiragana') {
    hiraganaQueue = buildHiraganaQueue(currentRound);
  } else {
    vocabQueue = getFilteredVocab();
  }
  resetScore();
  nextCard();
}

function getFilteredVocab() {
  let filtered = currentRound > 0 ? vocabCards.filter(c => c.round <= currentRound) : vocabCards;
  return filtered.map(c => {
    const saved = vocabProgress[c.display];
    const level = saved ?? (alreadyKnown.has(c.display) ? 2 : 0);
    const nextReview = saved != null ? 0 : -((recentBatch[c.display] ?? 0) * 5);
    return { ...c, level, nextReview };
  });
}

}

  vocabQueue = getFilteredVocab();
  resetScore();
  nextCard();
}

// ═══════════════════════════════
// NEXT CARD
// ═══════════════════════════════
function nextCard() {
  answered = false;
  if (sessionCount >= getSessionLimit()) { showResult(); return; }

  if (section === 'hiragana') {
    currentCard = pickFromQueue(hiraganaQueue);
    if (!currentCard) { showResult(); return; }
    if (hiraganaMode === 'char-to-reading') renderHiraganaMultiple();
    else if (hiraganaMode === 'char-to-input') renderHiraganaInput();
    else if (hiraganaMode === 'reading-to-char') renderReadingToCharMultiple();
    else renderReadingToCharInput();
  } else {
    currentVocab = pickFromQueue(vocabQueue);
    if (!currentVocab) { showResult(); return; }
    renderVocabMultiple();
  }
  updateProgress();
}

// ═══════════════════════════════
// HIRAGANA: MULTIPLE CHOICE
// ═══════════════════════════════
function getHiraganaDistractors(card) {
  const correct = card.reading;
  const correctChar = card.char;

  // 找出跟這個字形近的字
  const similarChars = new Set();
  for (const group of similarGroups) {
    if (group.includes(correctChar)) {
      group.forEach(c => { if (c !== correctChar) similarChars.add(c); });
    }
  }

  // 從形近字裡找 reading 作為干擾選項
  const similarReadings = cards
    .filter(c => similarChars.has(c.char) && c.reading !== correct)
    .map(c => c.reading);

  // 其他隨機選項
  const otherReadings = shuffle(
    cards.map(c => c.reading).filter(r => r !== correct && !similarReadings.includes(r))
  );

  // 優先用形近字，不夠再補隨機
  const distractors = shuffle([...similarReadings, ...otherReadings]).slice(0, 3);
  return shuffle([correct, ...distractors]);
}

function hintText(card) {
  const kata = card.katakana ? card.katakana + '　' : '';
  return `💡 ${kata}${card.hint}`;
}

function renderHiraganaMultiple() {
  const options = getHiraganaDistractors(currentCard);
  document.getElementById('quizContent').innerHTML = `
    <div class="question-type">這個字怎麼讀？</div>
    <div class="main-char">${currentCard.char}</div>
    <div class="hint" id="hintText">${showHint ? hintText(currentCard) : ''}</div>
    <div class="options">
      ${options.map(opt => `<button class="option-btn" onclick="checkHiraganaMultiple('${opt.replace(/'/g, "\\'")}', this)">${opt}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextCard()">下一題 →</button>
  `;
}

function checkHiraganaMultiple(chosen, btn) {
  if (answered) return;
  answered = true;
  const correct = currentCard.reading;
  const isCorrect = chosen === correct;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');
  advanceSRS(currentCard, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${correct}」`;
  document.getElementById('hintText').textContent = hintText(currentCard);
  document.getElementById('nextBtn').classList.add('visible');
}

// ═══════════════════════════════
// HIRAGANA: INPUT
// ═══════════════════════════════
function renderHiraganaInput() {
  const isN = currentCard.char === 'ん';
  document.getElementById('quizContent').innerHTML = `
    <div class="question-type">輸入羅馬字讀音</div>
    <div class="main-char">${currentCard.char}</div>
    ${isN ? '<div class="input-hint">ん → nn</div>' : ''}
    <div class="hint" id="hintText">${showHint ? hintText(currentCard) : ''}</div>
    <div class="input-wrap">
      <input class="romaji-input" id="romajiInput" type="text" placeholder="輸入羅馬字…"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
        onkeydown="if(event.key==='Enter')submitHiraganaInput()">
    </div>
    <button class="submit-btn" onclick="submitHiraganaInput()">確認</button>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextCard()">下一題 →</button>
  `;
  setTimeout(() => document.getElementById('romajiInput')?.focus(), 80);
}

function normalizeRomaji(s) {
  return s.trim().toLowerCase().replace(/\s+/g, '').replace(/oo/g, 'o').replace(/uu/g, 'u').replace(/nn/g, 'n');
}

function submitHiraganaInput() {
  if (answered) return;
  const inp = document.getElementById('romajiInput');
  if (!inp?.value.trim()) return;
  answered = true;
  const accepted = currentCard.reading.split('／').map(r => normalizeRomaji(r));
  const isCorrect = accepted.includes(normalizeRomaji(inp.value));
  inp.disabled = true;
  inp.classList.add(isCorrect ? 'correct' : 'wrong');
  advanceSRS(currentCard, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${currentCard.reading}」`;
  document.getElementById('hintText').textContent = hintText(currentCard);
  document.getElementById('nextBtn').classList.add('visible');
}

// ═══════════════════════════════
// HIRAGANA: 讀音→字 選擇
// ═══════════════════════════════
function getCharDistractors(card) {
  const correct = card.char;
  const similarChars = new Set();
  for (const group of similarGroups) {
    if (group.includes(correct)) group.forEach(c => { if (c !== correct) similarChars.add(c); });
  }
  const similarPool = cards.filter(c => similarChars.has(c.char) && c.char !== correct).map(c => c.char);
  const others = shuffle(cards.map(c => c.char).filter(c => c !== correct && !similarPool.includes(c)));
  return shuffle([correct, ...shuffle([...similarPool, ...others]).slice(0, 3)]);
}

function renderReadingToCharMultiple() {
  const options = getCharDistractors(currentCard);
  document.getElementById('quizContent').innerHTML = `
    <div class="question-type">哪個平假名是這個讀音？</div>
    <div class="main-char">${currentCard.reading}</div>
    <div class="hint" id="hintText">${showHint ? hintText(currentCard) : ''}</div>
    <div class="options">
      ${options.map(opt => `<button class="option-btn" onclick="checkReadingToChar('${opt.replace(/'/g, "\\'")}', this)">${opt}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextCard()">下一題 →</button>
  `;
}

function checkReadingToChar(chosen, btn) {
  if (answered) return;
  answered = true;
  const correct = currentCard.char;
  const isCorrect = chosen === correct;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');
  advanceSRS(currentCard, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${correct}」`;
  document.getElementById('hintText').textContent = hintText(currentCard);
  document.getElementById('nextBtn').classList.add('visible');
}

// ═══════════════════════════════
// HIRAGANA: 讀音→字 輸入
// ═══════════════════════════════
function renderReadingToCharInput() {
  document.getElementById('quizContent').innerHTML = `
    <div class="question-type">輸入對應的平假名</div>
    <div class="main-char">${currentCard.reading}</div>
    <div class="hint" id="hintText">${showHint ? hintText(currentCard) : ''}</div>
    <div class="input-wrap">
      <input class="romaji-input" id="kanaInput" type="text" placeholder="輸入平假名…"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
        onkeydown="if(event.key==='Enter')submitReadingToChar()">
    </div>
    <button class="submit-btn" onclick="submitReadingToChar()">確認</button>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextCard()">下一題 →</button>
  `;
  setTimeout(() => document.getElementById('kanaInput')?.focus(), 80);
}

function submitReadingToChar() {
  if (answered) return;
  const inp = document.getElementById('kanaInput');
  if (!inp?.value.trim()) return;
  answered = true;
  const isCorrect = inp.value.trim() === currentCard.char;
  inp.disabled = true;
  inp.classList.add(isCorrect ? 'correct' : 'wrong');
  advanceSRS(currentCard, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${currentCard.char}」`;
  document.getElementById('hintText').textContent = hintText(currentCard);
  document.getElementById('nextBtn').classList.add('visible');
}

// ═══════════════════════════════
// VOCAB: MULTIPLE CHOICE (both directions)
// ═══════════════════════════════
function getVocabDistractors(vocab) {
  const correct = vocabDir === 'jp-to-zh' ? vocab.meaning : vocab.display;
  const getVal = v => vocabDir === 'jp-to-zh' ? v.meaning : v.display;
  const distractors = shuffle(vocabCards.filter(v => getVal(v) !== correct).map(getVal)).slice(0, 3);
  return shuffle([correct, ...distractors]);
}

function renderVocabMultiple() {
  const options = getVocabDistractors(currentVocab);
  const question = vocabDir === 'jp-to-zh' ? currentVocab.display : currentVocab.meaning;
  const qtype = vocabDir === 'jp-to-zh' ? '這個日文是什麼意思？' : '這個日文怎麼說？';
  const isJp = vocabDir === 'jp-to-zh';

  document.getElementById('quizContent').innerHTML = `
    <div class="question-type">${qtype}</div>
    <div class="${isJp ? 'main-char' : 'main-meaning'}" style="${isJp ? 'font-size:2.8rem' : ''}">${question}</div>
    <div class="hint" id="hintText">${showHint && vocabDir === 'jp-to-zh' ? `💡 ${currentVocab.reading}` : ''}</div>
    <div class="options">
      ${options.map(opt => `<button class="option-btn vocab" onclick="checkVocabMultiple('${opt.replace(/'/g, "\\'")}', this)">${opt}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextCard()">下一題 →</button>
  `;
}

function checkVocabMultiple(chosen, btn) {
  if (answered) return;
  answered = true;
  // Accept all meanings sharing the same display (homonyms like さけ＝鮭魚／酒)
  const correctAnswers = vocabDir === 'jp-to-zh'
    ? vocabCards.filter(c => c.display === currentVocab.display).map(c => c.meaning)
    : [currentVocab.display];
  const isCorrect = correctAnswers.includes(chosen);
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (correctAnswers.includes(b.textContent.trim())) b.classList.add('correct');
  });
  if (!isCorrect) btn.classList.add('wrong');
  advanceSRS(currentVocab, isCorrect);
  const fb = document.getElementById('feedback');
  fb.className = `feedback ${isCorrect ? 'show-correct' : 'show-wrong'}`;
  const kp = currentVocab.kanji ? `${currentVocab.kanji} ` : '';
  const wrongHint = vocabDir === 'jp-to-zh' ? correctAnswers.join('／') : `${kp}${currentVocab.display}`;
  fb.innerHTML = isCorrect ? `✓ 正確！` : `✗ 正確是「${wrongHint}」`;
  document.getElementById('hintText').textContent = `💡 ${kp}${currentVocab.display}（${currentVocab.reading}）`;
  document.getElementById('nextBtn').classList.add('visible');
}

// ═══════════════════════════════
// RESULT
// ═══════════════════════════════
function showResult() {
  updateProgress();
  const pct = totalAnswered ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
  let emoji, msg, sub;
  if (pct >= 90) { emoji = '🎌'; msg = '完美！'; sub = `正確率 ${pct}%，繼續保持！`; }
  else if (pct >= 70) { emoji = '👏'; msg = '很好！'; sub = `正確率 ${pct}%，再練幾次就能鞏固。`; }
  else { emoji = '📖'; msg = '繼續練習！'; sub = `正確率 ${pct}%，間隔重複就是要反覆來。`; }

  document.getElementById('quizContent').innerHTML = `
    <div class="result-screen">
      <div class="big-emoji">${emoji}</div>
      <h2>${msg}</h2>
      <p>${sub}<br><br>正確 ${totalCorrect} / ${totalAnswered} 題</p>
      <button class="restart-btn" onclick="restartCurrent()">再練一次</button>
    </div>
  `;
}

function restartCurrent() {
  if (section === 'hiragana') {
    hiraganaQueue = buildHiraganaQueue(currentRound);
  } else {
    vocabQueue = getFilteredVocab();
  }
  resetScore();
  nextCard();
}

hiraganaQueue = buildHiraganaQueue(currentRound);
vocabQueue = getFilteredVocab();
