<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>日文學習筆記</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darkmode@latest/dist/style.min.css"/>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '← 回首頁',
      nameLink: '../',
      loadSidebar: true,
      basePath: '../',
      homepage: 'hiragana.md',
      subMaxLevel: 2,
      search: {
        placeholder: '搜尋筆記…',
        noData: '找不到結果',
        depth: 3,
        hideOtherSidebarContent: false,
      },
      darkMode: {
        dark:  { background: '#1e1e2e', toggleBtnBg: '#444', textColor: '#cdd6f4' },
        light: { background: '#ffffff', toggleBtnBg: '#34495e', textColor: '#34495e' },
      },
      plugins: [
        function(hook) {
          hook.beforeEach(function(content) {
            const fm = content.match(/^---[\s\S]*?---\n/);
            let footer = '';
            if (fm) {
              const m = fm[0].match(/updated:\s*(\d{4}-\d{2}-\d{2})/);
              if (m) footer = `\n\n---\n<small>最後更新：${m[1]}</small>`;
            }
            return content.replace(/^---[\s\S]*?---\n/, '') + footer;
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-darkmode@latest/dist/index.min.js"></script>
  <!-- Privacy-friendly analytics by Plausible -->
  <script async src="https://plausible.io/js/pa-hOrcFRAP-ZA3U7ijcUzGQ.js"></script>
  <script>
    window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
    plausible.init()
  </script>
  <!-- Ko-fi floating widget -->
  <script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
  <script>
    kofiWidgetOverlay.draw('ines8964', {
      'type': 'floating-chat',
      'floating-chat.donateButton.text': 'Support Me',
      'floating-chat.donateButton.background-color': '#c0392b',
      'floating-chat.donateButton.text-color': '#fff'
    });
  </script>
</body>
</html>
