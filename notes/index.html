<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>日文學習筆記</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '← 回首頁',
      nameLink: '../',
      loadSidebar: true,
      basePath: '../',
      homepage: 'hiragana.md',
      subMaxLevel: 2,
      plugins: [
        function(hook) {
          hook.beforeEach(function(content) {
            const fm = content.match(/^---[\s\S]*?---\n/);
            let footer = '';
            if (fm) {
              const m = fm[0].match(/updated:\s*(\d{4}-\d{2}-\d{2})/);
              if (m) footer = `\n\n---\n<small>最後更新：${m[1]}</small>`;
            }
            return content.replace(/^---[\s\S]*?---\n/, '') + footer;
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
</body>
</html>
